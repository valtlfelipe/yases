services:
  postgres:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: email
      POSTGRES_PASSWORD: email
      POSTGRES_DB: email_service
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U email -d email_service"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - internal

  valkey:
    image: valkey/valkey:8-alpine
    restart: unless-stopped
    volumes:
      - valkey_data:/data
    healthcheck:
      test: ["CMD", "valkey-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - internal

  migrate:
    build: ./apps/server
    command: bun run db:migrate
    env_file: apps/server/.env
    environment:
      DATABASE_URL: postgres://email:email@postgres:5432/email_service
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - internal

  server:
    build: ./apps/server
    command: bun src/index.ts
    restart: unless-stopped
    env_file: apps/server/.env
    environment:
      DATABASE_URL: postgres://email:email@postgres:5432/email_service
      REDIS_URL: redis://valkey:6379
    ports:
      - "3000:3000"
    depends_on:
      migrate:
        condition: service_completed_successfully
      valkey:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    networks:
      - internal

  worker:
    build: ./apps/server
    command: bun src/worker.ts
    restart: unless-stopped
    env_file: apps/server/.env
    environment:
      DATABASE_URL: postgres://email:email@postgres:5432/email_service
      REDIS_URL: redis://valkey:6379
    depends_on:
      migrate:
        condition: service_completed_successfully
      valkey:
        condition: service_healthy
    networks:
      - internal

  web:
    build:
      context: ./apps/web
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      NUXT_PUBLIC_API_URL: http://server:3000
    ports:
      - "80:3000"
    depends_on:
      server:
        condition: service_healthy
    networks:
      - internal

networks:
  internal:
    driver: bridge

volumes:
  postgres_data:
  valkey_data:
